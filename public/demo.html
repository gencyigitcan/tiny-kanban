<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Kanban – Demo Panosu</title>
    <meta name="description"
        content="Tiny Kanban uygulamasının herkese açık Türkçe demo sayfası — 6 sprint, gerçekçi proje verisi">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-brand">
            <div class="header-logo">D</div>
            <span class="header-title">Demo Panosu</span>
            <span class="header-subtitle" id="sprintBadge">—</span>
        </div>
        <div class="header-search">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Kart ara…" autocomplete="off">
        </div>
        <div class="header-filters">
            <select class="filter-select" id="filterAssignee">
                <option value="">Tüm kişiler</option>
            </select>
            <select class="filter-select" id="filterPriority">
                <option value="">Tüm öncelikler</option>
                <option value="high">🔴 Yüksek</option>
                <option value="medium">🟠 Orta</option>
                <option value="low">🟢 Düşük</option>
            </select>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" id="addTaskBtn">✚ <span class="label">Yeni Görev</span></button>
            <button class="btn btn-secondary" id="manageEpicsBtn">🏷 <span class="label">Epics</span></button>
            <button class="btn btn-secondary" id="manageSprintsBtn">⚡ <span class="label">Sprints</span></button>
            <button class="btn btn-danger" id="clearBtn">🗑 <span class="label">Temizle</span></button>
        </div>
    </header>

    <!-- VIEW TABS -->
    <div class="view-tabs font-sans">
        <button class="view-tab active" data-view="board">📋 Board</button>
        <button class="view-tab" data-view="list">☰ Liste</button>
        <button class="view-tab" data-view="backlog">📦 Backlog</button>
        <button class="view-tab" data-view="dashboard">📊 Dashboard</button>
        <button class="view-tab" data-view="gantt">📅 Gantt</button>
        <button class="view-tab" data-view="reports">📈 Raporlar</button>
    </div>

    <!-- BOARD VIEW -->
    <div class="view-container active" id="view-board">
        <main class="board-wrap">
            <section class="column" data-col="todo">
                <div class="col-header">
                    <div class="col-header-top">
                        <div class="col-title-wrap"><span class="col-dot"></span><span
                                class="col-title">Yapılacak</span></div>
                        <span class="col-count" data-count="todo">0</span>
                    </div>
                    <div class="wip-badge">Limit yok</div>
                </div>
                <div class="col-body" id="col-todo" data-col="todo" ondragover="onDragOver(event)"
                    ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div>Görev yok — <kbd>N</kbd> ile ekle</div>
                    </div>
                </div>
                <div class="quick-add"><input class="quick-add-input" type="text" placeholder="+ Hızlı ekle (Enter)"
                        data-col="todo"></div>
            </section>
            <section class="column" data-col="doing">
                <div class="col-header">
                    <div class="col-header-top">
                        <div class="col-title-wrap"><span class="col-dot"></span><span
                                class="col-title">Yapılıyor</span></div>
                        <span class="col-count" data-count="doing">0</span>
                    </div>
                    <div class="wip-badge">Limit yok</div>
                </div>
                <div class="col-body" id="col-doing" data-col="doing" ondragover="onDragOver(event)"
                    ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
                    <div class="empty-state">
                        <div class="empty-icon">⚡</div>
                        <div>Devam eden yok</div>
                    </div>
                </div>
                <div class="quick-add"><input class="quick-add-input" type="text" placeholder="+ Hızlı ekle (Enter)"
                        data-col="doing"></div>
            </section>
            <section class="column" data-col="done">
                <div class="col-header">
                    <div class="col-header-top">
                        <div class="col-title-wrap"><span class="col-dot"></span><span
                                class="col-title">Tamamlandı</span></div>
                        <span class="col-count" data-count="done">0</span>
                    </div>
                    <div class="wip-badge">Limit yok</div>
                </div>
                <div class="col-body" id="col-done" data-col="done" ondragover="onDragOver(event)"
                    ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
                    <div class="empty-state">
                        <div class="empty-icon">✅</div>
                        <div>Tamamlanan görevler burada</div>
                    </div>
                </div>
                <div class="quick-add"><input class="quick-add-input" type="text" placeholder="+ Hızlı ekle (Enter)"
                        data-col="done"></div>
            </section>
        </main>
    </div>

    <!-- LIST VIEW -->
    <div class="view-container" id="view-list">
        <div id="listView"></div>
    </div>

    <!-- BACKLOG VIEW -->
    <div class="view-container" id="view-backlog">
        <div id="backlogView"></div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div class="view-container" id="view-dashboard">
        <div id="dashboardView"></div>
    </div>

    <!-- GANTT VIEW -->
    <div class="view-container" id="view-gantt">
        <div id="ganttView"></div>
    </div>

    <!-- REPORTS VIEW -->
    <div class="view-container" id="view-reports">
        <div id="reportsView"></div>
    </div>

    <!-- ============================================================
     CARD DETAIL MODAL
     ============================================================ -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="cardModalTitle">Görev Detayı</h2>
                <button class="modal-close" id="cardModalClose">✕</button>
            </div>
            <div class="modal-body">
                <form id="cardForm" autocomplete="off">
                    <input type="hidden" id="editCardId">
                    <div class="form-group">
                        <label class="form-label">Başlık <span style="color:var(--danger)">*</span></label>
                        <input class="form-input" type="text" id="cardTitle" placeholder="ör. Login bug düzelt"
                            required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Açıklama</label>
                        <textarea class="form-textarea" id="cardDesc" placeholder="Detaylar…"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Kişi</label>
                            <input class="form-input" type="text" id="cardAssignee" placeholder="ör. Ali">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Öncelik</label>
                            <select class="form-select" id="cardPriority">
                                <option value="medium">🟠 Orta</option>
                                <option value="high">🔴 Yüksek</option>
                                <option value="low">🟢 Düşük</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Kolon</label>
                            <select class="form-select" id="cardColumn">
                                <option value="todo">Yapılacak</option>
                                <option value="doing">Yapılıyor</option>
                                <option value="done">Tamamlandı</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Story Points</label>
                            <input class="form-input" type="number" id="cardSP" min="0" max="100" placeholder="ör. 5">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Tahmini Efor (Saat)</label>
                            <input class="form-input" type="number" id="cardEstimatedEffort" min="0" max="9999" placeholder="ör. 8">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Harcanan Efor (Saat)</label>
                            <input class="form-input" type="number" id="cardSpentEffort" min="0" max="9999" placeholder="ör. 5">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Başlangıç Tarihi</label>
                            <input class="form-input" type="date" id="cardStart">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Bitiş Tarihi</label>
                            <input class="form-input" type="date" id="cardDue">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Epic</label>
                            <select class="form-select" id="cardEpic">
                                <option value="">— Epic seç —</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sprint</label>
                        <select class="form-select" id="cardSprint">
                            <option value="">— Sprint seç —</option>
                        </select>
                    </div>

                    <!-- Labels -->
                    <div class="form-group">
                        <label class="form-label">Etiketler</label>
                        <div class="labels-grid" id="labelsGrid"></div>
                    </div>

                    <!-- Subtasks -->
                    <div class="form-group">
                        <label class="form-label">Alt Görevler</label>
                        <div class="subtasks-list" id="subtasksList"></div>
                        <div class="add-subtask-row">
                            <input class="add-subtask-input" type="text" id="newSubtask" placeholder="Alt görev ekle…">
                            <button type="button" class="btn btn-secondary btn-sm" id="addSubtaskBtn">Ekle</button>
                        </div>
                    </div>

                    <!-- Comments -->
                    <div class="form-group" id="commentsSection" style="display:none">
                        <label class="form-label">Yorumlar</label>
                        <div class="comments-list" id="commentsList"></div>
                        <div class="add-comment-row">
                            <textarea class="add-comment-input" id="newComment" rows="2"
                                placeholder="Yorum ekle…"></textarea>
                            <button type="button" class="btn btn-secondary btn-sm" id="addCommentBtn"
                                style="align-self:flex-end">Gönder</button>
                        </div>
                    </div>

                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger btn-sm" id="deleteCardBtn" style="margin-right:auto">🗑
                    Sil</button>
                <button type="button" class="btn btn-secondary" id="cardCancelBtn">İptal</button>
                <button type="button" class="btn btn-primary" id="cardSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
     EPIC MANAGER MODAL
     ============================================================ -->
    <div class="modal-overlay" id="epicModal">
        <div class="modal" style="max-width:460px">
            <div class="modal-header">
                <h2 class="modal-title">🏷 Epic Yönetimi</h2>
                <button class="modal-close" onclick="closeModal('epicModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="manager-list" id="epicList"></div>
                <div class="form-row" style="margin-top:16px">
                    <input class="form-input" type="text" id="newEpicName" placeholder="Epic adı…">
                    <input class="form-input" type="color" id="newEpicColor" value="#6366f1"
                        style="width:48px;padding:4px 6px;cursor:pointer">
                    <button class="btn btn-primary btn-sm" id="addEpicBtn">Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
     SPRINT MANAGER MODAL
     ============================================================ -->
    <div class="modal-overlay" id="sprintModal">
        <div class="modal" style="max-width:460px">
            <div class="modal-header">
                <h2 class="modal-title">⚡ Sprint Yönetimi</h2>
                <button class="modal-close" onclick="closeModal('sprintModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="manager-list" id="sprintList"></div>
                <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px">
                    <input class="form-input" type="text" id="newSprintName" placeholder="Sprint adı… (ör. Sprint 1)">
                    <div class="form-row">
                        <div class="form-group" style="margin:0">
                            <label class="form-label" style="font-size:11px">Başlangıç</label>
                            <input class="form-input" type="date" id="newSprintStart">
                        </div>
                        <div class="form-group" style="margin:0">
                            <label class="form-label" style="font-size:11px">Bitiş</label>
                            <input class="form-input" type="date" id="newSprintEnd">
                        </div>
                    </div>
                    <button class="btn btn-primary btn-sm" id="addSprintBtn" style="align-self:flex-start">Sprint
                        Ekle</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <div class="kbd-hint"><kbd>N</kbd> Yeni görev &nbsp;·&nbsp; <kbd>Esc</kbd> Kapat</div>

    <script src="js/api.js"></script>
    <script src="js/seeder.js"></script>
    <script src="js/board.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
