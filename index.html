<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Kanban – Personal Task Board</title>
    <meta name="description"
        content="A minimal but powerful Kanban board for personal task management. Todo → Doing → Done.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
   DESIGN TOKENS
   ============================================================ */
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-2: #f7f8fa;
            --border: #e4e7ec;
            --border-hover: #c8cdd6;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;

            --col-todo-bg: #f9fafb;
            --col-todo-hdr: #374151;
            --col-doing-bg: #fffbf0;
            --col-doing-hdr: #92400e;
            --col-done-bg: #f0fdf4;
            --col-done-hdr: #166534;

            --pri-high: #ef4444;
            --pri-high-bg: #fef2f2;
            --pri-med: #f97316;
            --pri-med-bg: #fff7ed;
            --pri-low: #22c55e;
            --pri-low-bg: #f0fdf4;

            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --danger: #ef4444;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, .08), 0 1px 2px rgba(0, 0, 0, .04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, .10), 0 2px 4px rgba(0, 0, 0, .06);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, .14);
            --transition: all .18s ease;
        }

        /* ============================================================
   RESET & BASE
   ============================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            outline: none;
        }

        input,
        textarea,
        select {
            font-family: inherit;
            outline: none;
            border: none;
        }

        ul,
        ol {
            list-style: none;
        }

        /* ============================================================
   HEADER
   ============================================================ */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-search {
            flex: 1;
            max-width: 340px;
            position: relative;
        }

        .header-search input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface-2);
            font-size: 14px;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .header-search input:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
        }

        .header-search input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 15px;
        }

        .header-filters {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-select {
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface-2);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-select:focus {
            border-color: var(--accent);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary {
            background: var(--surface-2);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .btn-danger {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
        }

        .btn-danger:hover {
            background: #fee2e2;
        }

        /* ============================================================
   BOARD LAYOUT
   ============================================================ */
        .board-wrap {
            padding: 24px;
            display: flex;
            gap: 20px;
            min-height: calc(100vh - 60px);
            overflow-x: auto;
        }

        .column {
            flex: 1;
            min-width: 300px;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: var(--transition);
        }

        /* Column headers */
        .col-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .col-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .col-title-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .col-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .col-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        .col-count {
            font-size: 12px;
            font-weight: 600;
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .wip-badge {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .wip-warning {
            margin-top: 8px;
            padding: 6px 10px;
            background: var(--warning-bg);
            border: 1px solid #fde68a;
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: #92400e;
            display: none;
        }

        .wip-warning.show {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Column colors */
        .column[data-col="todo"] .col-dot {
            background: #6b7280;
        }

        .column[data-col="todo"] .col-title {
            color: var(--col-todo-hdr);
        }

        .column[data-col="doing"] .col-dot {
            background: #f59e0b;
        }

        .column[data-col="doing"] .col-title {
            color: var(--col-doing-hdr);
        }

        .column[data-col="done"] .col-dot {
            background: #22c55e;
        }

        .column[data-col="done"] .col-title {
            color: var(--col-done-hdr);
        }

        /* Column body (card list) */
        .col-body {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            min-height: 80px;
        }

        .col-body.drag-over {
            background: rgba(99, 102, 241, .05);
            outline: 2px dashed rgba(99, 102, 241, .3);
            outline-offset: -4px;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }

        .col-body.wip-block {
            pointer-events: none;
            opacity: .6;
        }

        /* Quick-add area */
        .quick-add {
            padding: 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .quick-add-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            font-size: 13px;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .quick-add-input:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .12);
        }

        .quick-add-input::placeholder {
            color: var(--text-muted);
        }

        /* ============================================================
   CARDS
   ============================================================ */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            cursor: grab;
            transition: box-shadow .15s ease, transform .15s ease;
            position: relative;
            user-select: none;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
        }

        .card.dragging {
            opacity: .4;
            transform: scale(.98);
            cursor: grabbing;
        }

        .card.drag-ghost {
            opacity: 1;
            box-shadow: var(--shadow-lg);
            transform: rotate(1.5deg) scale(1.03);
            cursor: grabbing;
            pointer-events: none;
        }

        .card-priority-bar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
        }

        .pri-high .card-priority-bar {
            background: var(--pri-high);
        }

        .pri-medium .card-priority-bar {
            background: var(--pri-med);
        }

        .pri-low .card-priority-bar {
            background: var(--pri-low);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-left: 8px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            flex: 1;
        }

        .card-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity .15s;
        }

        .card:hover .card-actions {
            opacity: 1;
        }

        .card-btn {
            width: 26px;
            height: 26px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            background: transparent;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .card-btn.edit:hover {
            background: rgba(99, 102, 241, .12);
            color: var(--accent);
        }

        .card-btn.del:hover {
            background: var(--pri-high-bg);
            color: var(--danger);
        }

        .card-desc {
            margin-top: 6px;
            margin-left: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.45;
        }

        .card-footer {
            margin-top: 10px;
            margin-left: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-assignee {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .assignee-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-priority-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: capitalize;
            letter-spacing: .02em;
        }

        .pri-high .card-priority-tag {
            background: var(--pri-high-bg);
            color: var(--pri-high);
        }

        .pri-medium .card-priority-tag {
            background: var(--pri-med-bg);
            color: var(--pri-med);
        }

        .pri-low .card-priority-tag {
            background: var(--pri-low-bg);
            color: var(--pri-low);
        }

        /* hidden card (search filter) */
        .card.hidden {
            display: none;
        }

        /* ============================================================
   DROP PLACEHOLDER
   ============================================================ */
        .drop-placeholder {
            height: 68px;
            border: 2px dashed rgba(99, 102, 241, .35);
            border-radius: var(--radius-md);
            background: rgba(99, 102, 241, .05);
            flex-shrink: 0;
        }

        /* ============================================================
   MODAL
   ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, .45);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 28px;
            width: 100%;
            max-width: 480px;
            transform: translateY(16px) scale(.97);
            transition: transform .2s ease;
        }

        .modal-overlay.open .modal {
            transform: translateY(0) scale(1);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            font-size: 14px;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .15);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        /* ============================================================
   TOAST
   ============================================================ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 18px;
            background: var(--text-primary);
            color: #fff;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            animation: slideIn .2s ease, fadeOut .3s ease 2.7s forwards;
            max-width: 300px;
        }

        .toast.warn {
            background: var(--warning);
            color: #1a1a1a;
        }

        @keyframes slideIn {
            from {
                transform: translateY(12px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(6px);
            }
        }

        /* ============================================================
   KEYBOARD HINT
   ============================================================ */
        .kbd-hint {
            position: fixed;
            bottom: 24px;
            left: 24px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            padding: 1px 5px;
            background: var(--border);
            color: var(--text-secondary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            border: 1px solid #c8cdd6;
            box-shadow: 0 1px 0 #c8cdd6;
        }

        /* ============================================================
   EMPTY STATE
   ============================================================ */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
        }

        .empty-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }

        /* ============================================================
   RESPONSIVE
   ============================================================ */
        @media (max-width: 768px) {
            .board-wrap {
                flex-direction: column;
                padding: 16px;
            }

            .column {
                min-width: unset;
                max-width: unset;
            }

            .header {
                flex-wrap: wrap;
                height: auto;
                padding: 12px 16px;
                gap: 8px;
            }

            .header-search {
                max-width: none;
                order: 10;
                flex-basis: 100%;
            }

            .header-filters {
                display: none;
            }

            .btn span {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
     HEADER
     ============================================================ -->
    <header class="header">
        <div class="header-brand">
            <div class="header-logo">K</div>
            <span class="header-title">Tiny Kanban</span>
        </div>

        <div class="header-search">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search cards… (any field)" autocomplete="off">
        </div>

        <div class="header-filters">
            <select class="filter-select" id="filterAssignee">
                <option value="">All assignees</option>
            </select>
            <select class="filter-select" id="filterPriority">
                <option value="">All priorities</option>
                <option value="high">🔴 High</option>
                <option value="medium">🟠 Medium</option>
                <option value="low">🟢 Low</option>
            </select>
        </div>

        <div class="header-actions">
            <button class="btn btn-primary" id="addTaskBtn">
                <span>✚</span><span>Add Task</span>
            </button>
            <button class="btn btn-secondary" id="demoBtn">
                <span>🎯</span><span>Demo Board</span>
            </button>
            <button class="btn btn-danger" id="clearBtn">
                <span>🗑</span><span>Clear</span>
            </button>
        </div>
    </header>

    <!-- ============================================================
     BOARD
     ============================================================ -->
    <main class="board-wrap" id="board">

        <!-- TODO -->
        <section class="column" data-col="todo">
            <div class="col-header">
                <div class="col-header-top">
                    <div class="col-title-wrap">
                        <span class="col-dot"></span>
                        <span class="col-title">Todo</span>
                    </div>
                    <span class="col-count" data-count="todo">0</span>
                </div>
                <div class="wip-badge">No WIP limit</div>
            </div>
            <div class="col-body" id="col-todo" data-col="todo" ondragover="onDragOver(event)" ondrop="onDrop(event)"
                ondragleave="onDragLeave(event)">
                <div class="empty-state">
                    <div class="empty-icon">📋</div>
                    <div>No tasks yet</div>
                    <div>Press <kbd>N</kbd> to add one</div>
                </div>
            </div>
            <div class="quick-add">
                <input class="quick-add-input" type="text" placeholder="+ Quick add (Enter to confirm)" data-col="todo">
            </div>
        </section>

        <!-- DOING -->
        <section class="column" data-col="doing">
            <div class="col-header">
                <div class="col-header-top">
                    <div class="col-title-wrap">
                        <span class="col-dot"></span>
                        <span class="col-title">Doing</span>
                    </div>
                    <span class="col-count" data-count="doing">0</span>
                </div>
                <div class="wip-badge">No WIP limit</div>
            </div>
            <div class="col-body" id="col-doing" data-col="doing" ondragover="onDragOver(event)" ondrop="onDrop(event)"
                ondragleave="onDragLeave(event)">
                <div class="empty-state">
                    <div class="empty-icon">⚡</div>
                    <div>Nothing in progress</div>
                </div>
            </div>
            <div class="quick-add">
                <input class="quick-add-input" type="text" placeholder="+ Quick add (Enter to confirm)"
                    data-col="doing">
            </div>
        </section>

        <!-- DONE -->
        <section class="column" data-col="done">
            <div class="col-header">
                <div class="col-header-top">
                    <div class="col-title-wrap">
                        <span class="col-dot"></span>
                        <span class="col-title">Done</span>
                    </div>
                    <span class="col-count" data-count="done">0</span>
                </div>
                <div class="wip-badge">No WIP limit</div>
            </div>
            <div class="col-body" id="col-done" data-col="done" ondragover="onDragOver(event)" ondrop="onDrop(event)"
                ondragleave="onDragLeave(event)">
                <div class="empty-state">
                    <div class="empty-icon">✅</div>
                    <div>Completed tasks appear here</div>
                </div>
            </div>
            <div class="quick-add">
                <input class="quick-add-input" type="text" placeholder="+ Quick add (Enter to confirm)" data-col="done">
            </div>
        </section>

    </main>

    <!-- ============================================================
     ADD / EDIT MODAL
     ============================================================ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <h2 class="modal-title" id="modalTitle">New Task</h2>
            <form id="cardForm" autocomplete="off">
                <input type="hidden" id="editCardId">
                <div class="form-group">
                    <label class="form-label" for="cardTitle">Title <span style="color:var(--danger)">*</span></label>
                    <input class="form-input" type="text" id="cardTitle" placeholder="e.g. Fix login bug" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cardDesc">Description</label>
                    <textarea class="form-textarea" id="cardDesc" placeholder="Optional details…"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="cardAssignee">Assignee</label>
                        <input class="form-input" type="text" id="cardAssignee" placeholder="e.g. Alice">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cardPriority">Priority</label>
                        <select class="form-select" id="cardPriority">
                            <option value="medium">🟠 Medium</option>
                            <option value="high">🔴 High</option>
                            <option value="low">🟢 Low</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cardColumn">Column</label>
                    <select class="form-select" id="cardColumn">
                        <option value="todo">Todo</option>
                        <option value="doing">Doing</option>
                        <option value="done">Done</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================================
     TOAST CONTAINER
     ============================================================ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Keyboard hint -->
    <div class="kbd-hint"><kbd>N</kbd> New task &nbsp;·&nbsp; <kbd>Esc</kbd> Close</div>

    <script>
        /* ============================================================
           STATE MANAGEMENT
           ============================================================ */
        const WIP_LIMIT = { todo: Infinity, doing: Infinity, done: Infinity };
        const LS_KEY = 'tiny_kanban_v2';

        let state = { cards: [] };   // { id, title, desc, assignee, priority, col, createdAt }

        function loadState() {
            try {
                const raw = localStorage.getItem(LS_KEY);
                if (raw) state = JSON.parse(raw);
            } catch { /* ignore */ }
            if (!Array.isArray(state.cards)) state.cards = [];
        }

        function saveState() {
            localStorage.setItem(LS_KEY, JSON.stringify(state));
        }

        /* ============================================================
           UTILITIES
           ============================================================ */
        let idCounter = Date.now();
        const uid = () => (++idCounter).toString(36);

        function initials(name) {
            if (!name) return '?';
            return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
        }

        function escHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        /* ============================================================
           CARD OPERATIONS
           ============================================================ */
        function addCard({ title, desc = '', assignee = '', priority = 'medium', col = 'todo', id = null, createdAt = null }) {
            if (!title.trim()) return null;
            if (colCount(col) >= WIP_LIMIT[col]) {
                showToast('⚠️ WIP limit reached for "' + col + '"', 'warn');
                return null;
            }
            const card = {
                id: id || uid(),
                title: title.trim(),
                desc: desc.trim(),
                assignee: assignee.trim(),
                priority,
                col,
                createdAt: createdAt || Date.now()
            };
            state.cards.push(card);
            saveState();
            return card;
        }

        function updateCard(id, data) {
            const idx = state.cards.findIndex(c => c.id === id);
            if (idx === -1) return;
            // Enforce WIP if column changed
            const old = state.cards[idx];
            if (data.col && data.col !== old.col) {
                if (colCount(data.col, id) >= WIP_LIMIT[data.col]) {
                    showToast('⚠️ WIP limit reached for "' + data.col + '"', 'warn');
                    return false;
                }
            }
            Object.assign(state.cards[idx], data);
            saveState();
            return true;
        }

        function deleteCard(id) {
            state.cards = state.cards.filter(c => c.id !== id);
            saveState();
        }

        function moveCard(id, toCol) {
            const card = state.cards.find(c => c.id === id);
            if (!card) return false;
            if (card.col === toCol) return true;
            if (colCount(toCol, id) >= WIP_LIMIT[toCol]) {
                showToast('⚠️ WIP limit reached — max ' + WIP_LIMIT[toCol] + ' tasks in "Doing"', 'warn');
                return false;
            }
            card.col = toCol;
            saveState();
            return true;
        }

        function colCount(col, excludeId = '') {
            return state.cards.filter(c => c.col === col && c.id !== excludeId).length;
        }

        /* ============================================================
           RENDER
           ============================================================ */
        function cardHTML(card) {
            const priLabel = { high: 'High', medium: 'Medium', low: 'Low' };
            return `
  <div class="card pri-${card.priority}"
       id="card-${card.id}"
       draggable="true"
       data-id="${card.id}"
       ondragstart="onDragStart(event)"
       ondragend="onDragEnd(event)">
    <div class="card-priority-bar"></div>
    <div class="card-top">
      <p class="card-title">${escHtml(card.title)}</p>
      <div class="card-actions">
        <button class="card-btn edit" title="Edit" onclick="openEdit('${card.id}')">✏️</button>
        <button class="card-btn del"  title="Delete" onclick="confirmDelete('${card.id}')">✕</button>
      </div>
    </div>
    ${card.desc ? `<p class="card-desc">${escHtml(card.desc)}</p>` : ''}
    <div class="card-footer">
      ${card.assignee
                    ? `<span class="card-assignee">
             <span class="assignee-avatar">${escHtml(initials(card.assignee))}</span>
             ${escHtml(card.assignee)}
           </span>`
                    : '<span></span>'}
      <span class="card-priority-tag">${priLabel[card.priority] || card.priority}</span>
    </div>
  </div>`;
        }

        function renderBoard() {
            const cols = ['todo', 'doing', 'done'];
            const q = (document.getElementById('searchInput').value || '').toLowerCase();
            const fa = document.getElementById('filterAssignee').value.toLowerCase();
            const fp = document.getElementById('filterPriority').value;

            cols.forEach(col => {
                const body = document.getElementById('col-' + col);
                const cards = state.cards.filter(c => c.col === col);
                let visCount = 0;

                // Clear except placeholders
                Array.from(body.querySelectorAll('.card')).forEach(el => el.remove());
                const emptyState = body.querySelector('.empty-state');

                // Insert filtered cards
                const frag = document.createDocumentFragment();
                const tmp = document.createElement('div');

                cards.forEach(card => {
                    const hidden = (
                        (q && !card.title.toLowerCase().includes(q)
                            && !card.desc.toLowerCase().includes(q)
                            && !card.assignee.toLowerCase().includes(q)) ||
                        (fa && card.assignee.toLowerCase() !== fa) ||
                        (fp && card.priority !== fp)
                    );
                    tmp.innerHTML = cardHTML(card);
                    const el = tmp.firstElementChild;
                    if (hidden) el.classList.add('hidden');
                    else visCount++;
                    frag.appendChild(el);
                });
                body.appendChild(frag);

                emptyState && (emptyState.style.display = (cards.length === 0) ? 'flex' : 'none');

                // Update count badge
                document.querySelector(`[data-count="${col}"]`).textContent = cards.length;
            });

            refreshAssigneeFilter();
        }

        function refreshAssigneeFilter() {
            const sel = document.getElementById('filterAssignee');
            const cur = sel.value;
            const names = [...new Set(state.cards.map(c => c.assignee).filter(Boolean))].sort();
            sel.innerHTML = '<option value="">All assignees</option>' +
                names.map(n => `<option value="${n.toLowerCase()}" ${cur.toLowerCase() === n.toLowerCase() ? 'selected' : ''}>${escHtml(n)}</option>`).join('');
        }

        /* ============================================================
           DRAG & DROP SYSTEM
           ============================================================ */
        let dragId = null;
        let dragSrc = null;

        function onDragStart(e) {
            dragId = e.currentTarget.dataset.id;
            dragSrc = e.currentTarget.closest('[data-col]').dataset.col;
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragId);

            // Ghost element
            const ghost = e.currentTarget.cloneNode(true);
            ghost.classList.add('drag-ghost');
            ghost.style.cssText = 'position:fixed;top:-1000px;left:-1000px;width:' + e.currentTarget.offsetWidth + 'px';
            document.body.appendChild(ghost);
            e.dataTransfer.setDragImage(ghost, e.offsetX, e.offsetY);
            setTimeout(() => ghost.remove(), 0);
        }

        function onDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            // Remove all drag-over styling
            document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over'));
            removePlaceholders();
        }

        function onDragOver(e) {
            e.preventDefault();
            const body = e.currentTarget;
            const col = body.dataset.col;
            const count = colCount(col, dragId);

            if (count >= WIP_LIMIT[col]) {
                e.dataTransfer.dropEffect = 'none';
                return;
            }
            e.dataTransfer.dropEffect = 'move';
            body.classList.add('drag-over');

            // Placeholder
            removePlaceholders();
            const ph = document.createElement('div');
            ph.className = 'drop-placeholder';
            // Insert before nearest card
            const target = getCardBelow(body, e.clientY);
            if (target) body.insertBefore(ph, target);
            else body.appendChild(ph);
        }

        function onDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
            removePlaceholders();
        }

        function onDrop(e) {
            e.preventDefault();
            const body = e.currentTarget;
            const toCol = body.dataset.col;
            body.classList.remove('drag-over');
            removePlaceholders();
            if (!dragId) return;
            if (moveCard(dragId, toCol)) {
                renderBoard();
            }
            dragId = null;
        }

        function removePlaceholders() {
            document.querySelectorAll('.drop-placeholder').forEach(el => el.remove());
        }

        function getCardBelow(container, y) {
            return [...container.querySelectorAll('.card:not(.dragging)')]
                .find(card => {
                    const box = card.getBoundingClientRect();
                    return y < box.top + box.height / 2;
                }) || null;
        }

        /* ============================================================
           MODAL
           ============================================================ */
        const overlay = document.getElementById('modalOverlay');
        const form = document.getElementById('cardForm');

        function openModal(opts = {}) {
            document.getElementById('modalTitle').textContent = opts.title || 'New Task';
            document.getElementById('editCardId').value = opts.id || '';
            document.getElementById('cardTitle').value = opts.cardTitle || '';
            document.getElementById('cardDesc').value = opts.cardDesc || '';
            document.getElementById('cardAssignee').value = opts.cardAssignee || '';
            document.getElementById('cardPriority').value = opts.cardPriority || 'medium';
            document.getElementById('cardColumn').value = opts.cardColumn || 'todo';
            overlay.classList.add('open');
            document.getElementById('cardTitle').focus();
        }

        function closeModal() {
            overlay.classList.remove('open');
            form.reset();
        }

        function openEdit(id) {
            const card = state.cards.find(c => c.id === id);
            if (!card) return;
            openModal({
                title: 'Edit Task',
                id: card.id,
                cardTitle: card.title,
                cardDesc: card.desc,
                cardAssignee: card.assignee,
                cardPriority: card.priority,
                cardColumn: card.col
            });
        }

        function confirmDelete(id) {
            const card = state.cards.find(c => c.id === id);
            if (!card) return;
            if (!confirm(`Delete "${card.title}"?`)) return;
            deleteCard(id);
            renderBoard();
            showToast('Task deleted');
        }

        form.addEventListener('submit', e => {
            e.preventDefault();
            const id = document.getElementById('editCardId').value;
            const title = document.getElementById('cardTitle').value;
            const desc = document.getElementById('cardDesc').value;
            const assignee = document.getElementById('cardAssignee').value;
            const priority = document.getElementById('cardPriority').value;
            const col = document.getElementById('cardColumn').value;

            if (id) {
                const ok = updateCard(id, { title, desc, assignee, priority, col });
                if (ok === false) return; // WIP blocked
                showToast('Task updated ✓');
            } else {
                const card = addCard({ title, desc, assignee, priority, col });
                if (!card) return;
                showToast('Task added ✓');
            }
            closeModal();
            renderBoard();
        });

        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

        /* ============================================================
           SEARCH & FILTER SYSTEM
           ============================================================ */
        document.getElementById('searchInput').addEventListener('input', renderBoard);
        document.getElementById('filterAssignee').addEventListener('change', renderBoard);
        document.getElementById('filterPriority').addEventListener('change', renderBoard);

        /* ============================================================
           QUICK ADD
           ============================================================ */
        document.querySelectorAll('.quick-add-input').forEach(input => {
            input.addEventListener('keydown', e => {
                if (e.key !== 'Enter') return;
                const col = input.dataset.col;
                const title = input.value.trim();
                if (!title) return;
                const card = addCard({ title, col });
                if (card) {
                    input.value = '';
                    renderBoard();
                    showToast('Task added ✓');
                }
            });
        });

        /* ============================================================
           HEADER BUTTON HANDLERS
           ============================================================ */
        document.getElementById('addTaskBtn').addEventListener('click', () => openModal());
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (!state.cards.length) { showToast('Board is already empty'); return; }
            if (!confirm('Clear ALL tasks? This cannot be undone.')) return;
            state.cards = [];
            saveState();
            renderBoard();
            showToast('Board cleared');
        });

        /* ============================================================
           DEMO BOARD
           ============================================================ */
        const DEMO_CARDS = [
            { title: 'Fix login bug', desc: 'Users cannot log in with SSO providers.', assignee: 'Alice', priority: 'high', col: 'doing' },
            { title: 'Design homepage hero', desc: 'Create new hero section with gradient text.', assignee: 'Bob', priority: 'medium', col: 'doing' },
            { title: 'Prepare standup report', desc: 'Summarise sprint progress for PM meeting.', assignee: 'Alice', priority: 'low', col: 'doing' },
            { title: 'Refactor API service', desc: 'Extract shared HTTP client into a util module.', assignee: 'Carol', priority: 'medium', col: 'todo' },
            { title: 'Deploy staging server', desc: 'Provision new EC2 + nginx config.', assignee: 'Dave', priority: 'high', col: 'todo' },
            { title: 'Write unit tests', desc: 'Coverage target: 80% on auth module.', assignee: 'Carol', priority: 'medium', col: 'todo' },
            { title: 'Update README', desc: 'Document the new API endpoints.', assignee: 'Bob', priority: 'low', col: 'done' },
            { title: 'Migrate to TypeScript', desc: 'Convert legacy JS files to .ts.', assignee: 'Dave', priority: 'medium', col: 'done' },
        ];

        document.getElementById('demoBtn').addEventListener('click', () => {
            state.cards = [];
            // Bypass WIP checks — push demo cards directly into state
            DEMO_CARDS.forEach(c => {
                state.cards.push({
                    id: uid(),
                    title: c.title,
                    desc: c.desc || '',
                    assignee: c.assignee || '',
                    priority: c.priority || 'medium',
                    col: c.col || 'todo',
                    createdAt: Date.now()
                });
            });
            saveState();
            renderBoard();
            showToast('Demo board loaded 🎯');
        });

        /* ============================================================
           TOAST SYSTEM
           ============================================================ */
        function showToast(msg, type = '') {
            const el = document.createElement('div');
            el.className = 'toast' + (type ? ' ' + type : '');
            el.textContent = msg;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => el.remove(), 3100);
        }

        /* ============================================================
           KEYBOARD SHORTCUTS
           ============================================================ */
        document.addEventListener('keydown', e => {
            const tag = document.activeElement.tagName.toLowerCase();
            if (['input', 'textarea', 'select'].includes(tag)) return;
            if (e.key === 'n' || e.key === 'N') openModal();
            if (e.key === 'Escape') closeModal();
        });
        overlay.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        /* ============================================================
           PERSISTENCE LAYER — boot
           ============================================================ */
        loadState();
        renderBoard();
    </script>

    <!--
==============================================================
  HOW TINY KANBAN WORKS
==============================================================

  OVERVIEW
  --------
  Tiny Kanban is a single-file personal task management tool
  implementing the classic Todo → Doing → Done workflow.
  All data is stored in the browser's localStorage under the
  key "tiny_kanban_v2" — no server required.

  ARCHITECTURE (inside this file)
  --------------------------------
  HTML  → semantic sections: <header>, <main>, columns, modal
  CSS   → design-token variables at :root, modular sections
  JS    → six logical sections:
    1. State Management  – state object, loadState(), saveState()
    2. Card Operations   – addCard(), updateCard(), deleteCard(), moveCard()
    3. Drag & Drop       – onDragStart/Over/Leave/Drop, ghost image
    4. Render            – cardHTML(), renderBoard()
    5. Search/Filter     – live input listeners on search + selects
    6. Persistence Layer – localStorage read/write on every mutation

  WIP LIMITS
  ----------
  Defined in the WIP_LIMIT object:
    { todo: Infinity, doing: 3, done: Infinity }
  Adjust the "doing" value to change the limit.

  HOW TO DEPLOY
  -------------
  Option A – Local:   Open index.html directly in any browser.
  Option B – GitHub Pages:
    1. Push this file to a repo as index.html
    2. Enable Pages in repo Settings → Pages → main branch /root
    3. Visit https://<user>.github.io/<repo>
  Option C – Netlify Drop:
    Drag the file onto https://app.netlify.com/drop

  CUSTOMISE COLORS
  ----------------
  Edit CSS variables in the :root block near the top of <style>:
    --pri-high   / --pri-high-bg   → High priority color
    --pri-med    / --pri-med-bg    → Medium priority color
    --pri-low    / --pri-low-bg    → Low priority color
    --accent     / --accent-hover  → Button / focus ring color
    --bg                           → Page background
    --surface                      → Card / column background

  CUSTOMISE WIP LIMIT
  -------------------
  Find the JS constant:
    const WIP_LIMIT = { todo: Infinity, doing: 3, done: Infinity };
  Change 3 to your preferred limit for the "Doing" column.

  KEYBOARD SHORTCUTS
  ------------------
    N    → Open "New Task" modal
    Esc  → Close modal

==============================================================
-->
</body>

</html>
